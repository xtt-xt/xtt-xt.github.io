<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星天(xtt) - 个人主页</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
        color: #c9d1d9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        max-width: 600px;
        background: rgba(22, 27, 34, 0.8);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(48, 54, 61, 0.5);
        border-radius: 24px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        padding: 3rem 2rem;
        text-align: center;
        transition: transform 0.3s ease;
      }
      .card:hover {
        transform: translateY(-4px);
      }
      .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 3px solid #30363d;
        margin-bottom: 1.5rem;
        object-fit: cover;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        color: #58a6ff;
      }
      .tagline {
        color: #8b949e;
        margin-bottom: 2rem;
        font-size: 1.05rem;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .btn {
        padding: 0.6rem 1.6rem;
        border: 1px solid #30363d;
        border-radius: 6px;
        text-decoration: none;
        color: #c9d1d9;
        font-size: 0.9rem;
        font-weight: 500;
        background: #21262d;
        transition: all 0.2s;
      }
      .btn:hover {
        background: #30363d;
        border-color: #58a6ff;
        color: #58a6ff;
      }
      .btn-primary {
        background: #238636;
        border-color: #2ea043;
        color: white;
      }
      .btn-primary:hover {
        background: #2ea043;
      }
      .projects {
        margin-top: 2rem;
        text-align: left;
      }
      .projects h2 {
        font-size: 1.2rem;
        margin-bottom: 1rem;
        color: #58a6ff;
        text-align: center;
      }
      .project-item {
        display: block;
        padding: 1rem;
        margin-bottom: 0.8rem;
        border: 1px solid #30363d;
        border-radius: 12px;
        text-decoration: none;
        color: #c9d1d9;
        transition: all 0.2s;
      }
      .project-item:hover {
        background: #161b22;
        border-color: #58a6ff;
      }
      .project-item h3 {
        font-size: 1rem;
        margin-bottom: 0.3rem;
      }
      .project-item p {
        font-size: 0.85rem;
        color: #8b949e;
      }
      .status-badge {
        display: inline-block;
        background: #1f6feb;
        color: white;
        padding: 0.15rem 0.5rem;
        border-radius: 20px;
        font-size: 0.7rem;
        margin-left: 0.5rem;
      }
      .status-badge.planning {
        background: #30363d;
        color: #8b949e;
      }
      .footer {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: #484f58;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="avatar.png" alt="头像" class="avatar" />
      <h1>星天 (xtt)</h1>
      <p class="tagline">普通的AI编程师 · 开源爱好者</p>

      <div class="links">
        <a href="https://github.com/xtt-xt" class="btn" target="_blank"
          >GitHub</a
        >
        <a
          href="https://space.bilibili.com/1207935066"
          class="btn"
          target="_blank"
          >Bilibili</a
        >
        <a href="kimi.html" class="btn btn-primary">AI 应用集</a>
      </div>

      <div class="projects">
        <h2>🚀 精选项目</h2>
        <a href="game-detail.html" class="project-item">
          <h3>AI对话游戏 <span class="status-badge">开发中</span></h3>
          <p>与AI角色进行有趣的对话，体验智能聊天的乐趣</p>
        </a>
        <a href="kimi.html" class="project-item">
          <h3>Kimi发现页 <span class="status-badge">已上线</span></h3>
          <p>探索AI应用、游戏开发和创意项目的实验场</p>
        </a>
        <div class="project-item">
          <h3>Nemo Mobile Mod Studio</h3>
          <p>网易基岩版可视化模组制作软件</p>
        </div>
      </div>

      <div class="footer">© 2026 星天(xtt) · Powered by GitHub Pages</div>
    </div>
  </body>
</html>
